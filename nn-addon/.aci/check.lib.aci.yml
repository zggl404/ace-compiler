version: "2.0"

stages:
  - META
  - CHECK_SINGLE
  - CHECK_GROUP

components:
  ace-check:
    kind: agent
    inputs:
      arch:
        description: 'arch'
        defaultValue: x86_64
      image:
        description: 'imageBuild'
        defaultValue: ${{jobs.meta.outputs.metadata.imageBuild}}:${{parameters.version}}
      branch:
        description: 'branch'
        defaultValue: ${{vcs.ref}}
      token:
        description: 'tokenCI'
        defaultValue: ${{secrets.ciToken}}
      option:
        description: 'buildOptions'
        defaultValue: ''
      parall:
        description: 'parallNum'
        defaultValue: 40
    execute:
      agent:
        arch: ${{inputs.arch}}
        container:
          image: ${{inputs.image}}
        resourceClass: L
      steps:
        - name: shell
          displayName: 'CLONE'
          with:
            script: |
              git clone -b master https://git:${{inputs.token}}@code.alipay.com/air-infra/air-infra.git
              git clone -b ${{inputs.branch}} https://git:${{inputs.token}}@code.alipay.com/air-infra/nn-addon.git
        - name: shell
          displayName: 'INSTALL-LIB'
          with:
            script: |
              export CI_TOKEN=${{inputs.token}}
              cmake -S air-infra -B build.air
              cmake --build build.air -- -j ${{inputs.parall}}
              cmake --install build.air
        - name: shell
          displayName: 'BUILD'
          with:
            script: |
              cmake -S nn-addon -B build ${{inputs.option}}
              cmake --build build -- -j ${{inputs.parall}}
        - name: shell
          displayName: 'INSTALL'
          with:
            script: |
              cmake --install build


jobs:
  meta:
    stage: META
    id: meta
    component: aci-metadata
  config:
    stage: META
    id: config
    component: aci-metadata
    inputs:
      key: app

  CMAKE_BUILD_TYPE=Debug:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DCMAKE_BUILD_TYPE=Debug
  BUILD_UNITTEST=OFF:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DBUILD_UNITTEST=OFF
  BUILD_BENCH=OFF:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DBUILD_BENCH=OFF
  NN_BUILD_TEST=OFF:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DNN_BUILD_TEST=OFF
  NN_BUILD_EXAMPLE=OFF:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DNN_BUILD_EXAMPLE=OFF
  NN_INSTALL_APP=OFF:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -DNN_INSTALL_APP=OFF
  GNinja:
    stage: CHECK_SINGLE
    component: ace-check
    inputs:
      option: -GNinja

  GROUP_OPTIONS_01:
    stage: CHECK_GROUP
    component: ace-check
    inputs:
      option: -DBUILD_SHARED=OFF -DBUILD_UNITTEST=OFF -DBUILD_BENCH=OFF -DNN_BUILD_TEST=OFF -DNN_BUILD_EXAMPLE=OFF -DNN_INSTALL_APP=OFF
