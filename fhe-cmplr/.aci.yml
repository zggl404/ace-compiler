  unit.deb.x86_64:
    id: unit.deb.x86_64
    stage: UNIT_TEST
    component: common-ut
    inputs:
      type: LINUX_CONTAINER
      image: ${{parameters.image_test}}
      resourceClass: XL
      script: |
        wget -q "${{jobs.build_deb_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.target}}
        mkdir -p /opt/avhc && tar xf ${{parameters.target}} -C /opt/avhc
        ossutil64 cp ${{parameters.oss_cti}} ${{parameters.cti}} --update
        mkdir -p /app/cti && tar xf ${{parameters.cti}} -C /app/cti

        cd /app/cti && pip3 install -r requirements.txt
        pytest -m 'unittest or example or test' --type=Debug --junit-xml=/home/jenkins/agent/aci/codeWorkspace/report.xml
      caseReportPath: "report.xml"
      enableArtifacts: false
    config:
      afterExecute:
        checkRule:
        - ${{outputs.caseFailCount}} < 1

  unit.rel.x86_64:
