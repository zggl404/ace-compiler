version: "2.0"

# Build Packages for Push/pullRequest/Merge to Master
# oss://antsys-fhe/aci/master/fhe-cmplr_deb.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_rel.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_deb_aarch64.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_rel_aarch64.tar.gz

# oss://antsys-fhe/aci/master/fhe-cmplr_deb_omp.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_rel_omp.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_deb_omp_aarch64.tar.gz
# oss://antsys-fhe/aci/master/fhe-cmplr_rel_omp_aarch64.tar.gz

parameters:
  image_base:             "reg.docker.alibaba-inc.com/ace/dev:ci"
  image_base_aarch64:     "reg.docker.alibaba-inc.com/ace/dev:ci_aarch64"
  # image_base_omp:         "reg.docker.alibaba-inc.com/ace/dev_omp:ci"
  # image_base_omp_aarch64: "reg.docker.alibaba-inc.com/ace/dev_omp:ci_aarch64"

  image_test:             "reg.docker.alibaba-inc.com/ace/cti:ci"
  image_test_aarch64:     "reg.docker.alibaba-inc.com/ace/cti:ci_aarch64"

  options:                "-DFHE_WITH_SRC=\"air-infra;nn-addon\" -GNinja -DCMAKE_INSTALL_PREFIX=install"
  target:                 "target.tar.gz"

  # Test Packages
  cti:                    "cti.tar.gz"
  oss_cti:                "oss://antsys-fhe/cti/package/cti.tar.gz"

  # Build Packages
  oss_path:               "oss://antsys-fhe/aci/master"
  pack_deb:               "fhe-cmplr_deb.tar.gz"
  pack_rel:               "fhe-cmplr_rel.tar.gz"
  pack_deb_aarch64:       "fhe-cmplr_deb_aarch64.tar.gz"
  pack_rel_aarch64:       "fhe-cmplr_rel_aarch64.tar.gz"

  pack_deb_omp:           "fhe-cmplr_deb_omp.tar.gz"
  pack_rel_omp:           "fhe-cmplr_rel_omp.tar.gz"
  pack_deb_omp_aarch64:   "fhe-cmplr_deb_omp_aarch64.tar.gz"
  pack_rel_omp_aarch64:   "fhe-cmplr_rel_omp_aarch64.tar.gz"

triggers:
  git:
    push:
      changesIgnore:
        - ^LEGAL.md$
        - ^README.md$
        - ^doc/**
    pullRequest:
      changesIgnore:
        - ^LEGAL.md$
        - ^README.md$
        - ^doc/**

stages:
  - BUILD
  - UNIT_TEST
  - BENCH_TEST
  - UPLOAD

jobs:
  build.deb.x86_64:
    stage: BUILD
    id: build_deb_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Debug
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.rel.x86_64:
    stage: BUILD
    id: build_rel_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base}}
      buildTasks:
        - name: Dependency
          commands: |
