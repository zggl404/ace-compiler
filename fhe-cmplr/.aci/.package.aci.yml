      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base_omp}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_deb_omp}}
      timeoutInSec: 7200
      nydusSwitch: false
      errWhenImageExists: false

  image.rel_omp.x86_64:
    stage: IMAGE
    id: image.rel_omp.x86_64
    component: docker-image-build
    only:
      - ^master$
    inputs:
      beforeScriptImage: ${{parameters.image_base_omp}}
      beforeScript: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        ossutil64 cp ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel_omp}} .aci/dockerfile/${{parameters.pack_rel_omp}} --update
        ossutil64 cp ${{parameters.oss_cti}} .aci/dockerfile/${{parameters.cti}} --update
      imageName: ${{parameters.image_target}}
      imageTag: ${{parameters.tag_rel_omp}}
      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base_omp}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_rel_omp}}
      timeoutInSec: 7200
      nydusSwitch: false
      errWhenImageExists: false

  image.deb.aarch64:
    stage: IMAGE
    id: image.deb.aarch64
    component: docker-image-build-aarch64
    only:
      - ^master$
    inputs:
      beforeScriptImage: ${{parameters.image_base_aarch64}}
