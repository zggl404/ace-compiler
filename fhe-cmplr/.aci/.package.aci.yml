    inputs:
      beforeScriptImage: ${{parameters.image_base_omp_aarch64}}
      beforeScript: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        ossutil64 cp ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel_omp_aarch64}} .aci/dockerfile/${{parameters.pack_rel_omp_aarch64}} --update
        ossutil64 cp ${{parameters.oss_cti}} .aci/dockerfile/${{parameters.cti}} --update
      imageName: ${{parameters.image_target}}
      imageTag: ${{parameters.tag_rel_omp_aarch64}}
      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base_omp_aarch64}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_rel_omp_aarch64}}
      timeoutInSec: 7200
      nydusSwitch: false
      errWhenImageExists: false

  unit.deb.x86_64:
    id: unit.deb.x86_64
    stage: UNIT_TEST
    component: common-ut
    inputs:
      type: LINUX_CONTAINER
      image: ${{parameters.image_test}}
      resourceClass: XL
      script: |
        wget -q "${{jobs.build_deb_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_deb}}
