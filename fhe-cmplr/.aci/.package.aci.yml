    inputs:
      image: ${{parameters.image_base}}
      script: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        wget -q "${{jobs.build_deb_omp_aarch64.outputs.artifacts.target.url}}" -O ${{parameters.pack_deb_omp_aarch64}}
        wget -q "${{jobs.build_rel_omp_aarch64.outputs.artifacts.target.url}}" -O ${{parameters.pack_rel_omp_aarch64}}

        ossutil64 cp ${{parameters.pack_deb_omp_aarch64}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb_omp_aarch64}} --update
        ossutil64 cp ${{parameters.pack_rel_omp_aarch64}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel_omp_aarch64}} --update

  image.deb.x86_64:
    stage: IMAGE
    id: image.deb.x86_64
    component: docker-image-build
    only:
      - ^master$
    inputs:
      beforeScriptImage: ${{parameters.image_base}}
      beforeScript: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        ossutil64 cp ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb}} .aci/dockerfile/${{parameters.pack_deb}} --update
        ossutil64 cp ${{parameters.oss_cti}} .aci/dockerfile/${{parameters.cti}} --update
      imageName: ${{parameters.image_target}}
      imageTag: ${{parameters.tag_deb}}
      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_deb}}
      timeoutInSec: 7200
      nydusSwitch: false
      errWhenImageExists: false

  image.rel.x86_64:
