    id: image.rel.x86_64
    component: docker-image-build
    only:
      - ^master$
    inputs:
      beforeScriptImage: ${{parameters.image_base}}
      beforeScript: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        ossutil64 cp ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel}} .aci/dockerfile/${{parameters.pack_rel}} --update
        ossutil64 cp ${{parameters.oss_cti}} .aci/dockerfile/${{parameters.cti}} --update
      imageName: ${{parameters.image_target}}
      imageTag: ${{parameters.tag_rel}}
      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_rel}}
