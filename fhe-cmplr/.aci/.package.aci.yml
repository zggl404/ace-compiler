        ossutil64 cp ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb_omp_aarch64}} .aci/dockerfile/${{parameters.pack_deb_omp_aarch64}} --update
        ossutil64 cp ${{parameters.oss_cti}} .aci/dockerfile/${{parameters.cti}} --update
      imageName: ${{parameters.image_target}}
      imageTag: ${{parameters.tag_deb_omp_aarch64}}
      dockerfile: .aci/dockerfile/daily.Dockerfile
      contextDir: .aci/dockerfile
      buildArgs: IMAGE_BASE=${{parameters.image_base_omp_aarch64}},CTI=${{parameters.cti}},AVHC=${{parameters.pack_deb_omp_aarch64}}
