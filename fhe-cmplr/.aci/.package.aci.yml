version: "2.0"

# Build Packages for Nightly
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_deb.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_rel.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_deb_aarch64.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_rel_aarch64.tar.gz

# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_deb_omp.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_rel_omp.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_deb_omp_aarch64.tar.gz
# oss://antsys-fhe/daily/"DATE"/fhe-cmplr_rel_omp_aarch64.tar.gz

# Build Test Images for CD(Nightly)
# reg.docker.alibaba-inc.com/avh/avh:deb
# reg.docker.alibaba-inc.com/avh/avh:rel
# reg.docker.alibaba-inc.com/avh/avh:deb_aarch64
# reg.docker.alibaba-inc.com/avh/avh:rel_aarch64

# reg.docker.alibaba-inc.com/avh/avh:deb_omp
# reg.docker.alibaba-inc.com/avh/avh:rel_omp
# reg.docker.alibaba-inc.com/avh/avh:deb_omp_aarch64
# reg.docker.alibaba-inc.com/avh/avh:rel_omp_aarch64

parameters:
  image_base:             "reg.docker.alibaba-inc.com/ace/dev:ci"
  image_base_aarch64:     "reg.docker.alibaba-inc.com/ace/dev:ci_aarch64"
  image_base_omp:         "reg.docker.alibaba-inc.com/ace/dev_omp:ci"
  image_base_omp_aarch64: "reg.docker.alibaba-inc.com/ace/dev_omp:ci_aarch64"

  image_test:             "reg.docker.alibaba-inc.com/ace/cti:ci"
  image_test_aarch64:     "reg.docker.alibaba-inc.com/ace/cti:ci_aarch64"

  options: "-DBUILD_UNITTEST=ON -DBUILD_BENCH=ON -DBUILD_DOC=ON -DFHE_CODE_CHECK=ON -DFHE_BUILD_TEST=ON -DFHE_BUILD_EXAMPLE=ON -DFHE_INSTALL_APP=ON -DFHE_WITH_SRC=\"air-infra;nn-addon\" -GNinja -DCMAKE_INSTALL_PREFIX=install"
  target:                 "target.tar.gz"

  # Test Packages
  cti:                    "cti.tar.gz"
  oss_cti:                "oss://antsys-fhe/cti/package/cti.tar.gz"

  # Build Packages
  oss_path:               "oss://antsys-fhe/daily"
  pack_deb:               "fhe-cmplr_deb.tar.gz"
  pack_rel:               "fhe-cmplr_rel.tar.gz"
  pack_deb_aarch64:       "fhe-cmplr_deb_aarch64.tar.gz"
  pack_rel_aarch64:       "fhe-cmplr_rel_aarch64.tar.gz"

  pack_deb_omp:           "fhe-cmplr_deb_omp.tar.gz"
  pack_rel_omp:           "fhe-cmplr_rel_omp.tar.gz"
  pack_deb_omp_aarch64:   "fhe-cmplr_deb_omp_aarch64.tar.gz"
  pack_rel_omp_aarch64:   "fhe-cmplr_rel_omp_aarch64.tar.gz"

  pack_perf:              "fhe-cmplr_perf.tar.gz"

  ## Build Images
  image_target:         "reg.docker.alibaba-inc.com/avh/avh"
  tag_deb:              "deb"
  tag_rel:              "rel"
  tag_deb_aarch64:      "deb_aarch64"
  tag_rel_aarch64:      "rel_aarch64"

  tag_deb_omp:          "deb_omp"
  tag_rel_omp:          "rel_omp"
  tag_deb_omp_aarch64:  "deb_omp_aarch64"
  tag_rel_omp_aarch64:  "rel_omp_aarch64"

stages:
  - BUILD
  - UPLOAD
  - IMAGE
  - UNIT_TEST
  - BENCH_TEST

jobs:
  build.deb.x86_64:
    stage: BUILD
    id: build_deb_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Debug
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.rel.x86_64:
    stage: BUILD
    id: build_rel_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Release
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.rel.perf.x86_64:
    stage: BUILD
    id: build_rel_perf_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Release -DBUILD_TCM=ON
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.deb.omp.x86_64:
    stage: BUILD
    id: build_deb_omp_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base_omp}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Debug -DBUILD_WITH_OPENMP=ON
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.rel.omp.x86_64:
    stage: BUILD
    id: build_rel_omp_x86_64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER
        image: ${{parameters.image_base_omp}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_OPENMP=ON
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.deb.aarch64:
    stage: BUILD
    id: build_deb_aarch64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER_ARM64
        image: ${{parameters.image_base_aarch64}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Debug
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  build.rel.aarch64:
    stage: BUILD
    id: build_rel_aarch64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER_ARM64
        image: ${{parameters.image_base_aarch64}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Release
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}
        
  build.deb.omp.aarch64:
    stage: BUILD
    id: build_deb_omp_aarch64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER_ARM64
        image: ${{parameters.image_base_omp_aarch64}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
