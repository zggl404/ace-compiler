  build.rel.omp.aarch64:
    stage: BUILD
    id: build_rel_omp_aarch64
    component: ant-code-build
    inputs:
      name: build
      resources: []
      resourceClass: XL
      environment:
        type: LINUX_CONTAINER_ARM64
        image: ${{parameters.image_base_omp_aarch64}}
      buildTasks:
        - name: Dependency
          commands: |
            git clone -b master git@code.alipay.com:air-infra/air-infra.git
            git clone -b master git@code.alipay.com:air-infra/nn-addon.git
            git clone -b ${{vcs.ref}} git@code.alipay.com:fhe-cmplr/fhe-cmplr.git
        - name: Build
          commands: |
            cmake -S fhe-cmplr -B build ${{parameters.options}} -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_OPENMP=ON
            cmake --build build -- -j12
            cmake --build build --target test
            cmake --install build
        - name: Package
          commands: |
            tar czf ${{parameters.target}} -C install .
      artifacts:
        - name: target
          type: file
          path: ${{parameters.target}}

  upload.lib.x86_64:
    stage: UPLOAD
    component: shell
    only:
      - ^master$
    inputs:
      image: ${{parameters.image_base}}
      script: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        wget -q "${{jobs.build_deb_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_deb}}
        wget -q "${{jobs.build_rel_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_rel}}
        wget -q "${{jobs.build_rel_perf_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_perf}}

        ossutil64 cp ${{parameters.pack_deb}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb}} --update
        ossutil64 cp ${{parameters.pack_rel}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel}} --update
        ossutil64 cp ${{parameters.pack_perf}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_perf}} --update

  upload.lib_omp.x86_64:
    stage: UPLOAD
    component: shell
    only:
      - ^master$
    inputs:
      image: ${{parameters.image_base}}
      script: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        wget -q "${{jobs.build_deb_omp_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_deb_omp}}
        wget -q "${{jobs.build_rel_omp_x86_64.outputs.artifacts.target.url}}" -O ${{parameters.pack_rel_omp}}

        ossutil64 cp -f ${{parameters.pack_deb_omp}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb_omp}}
        ossutil64 cp -f ${{parameters.pack_rel_omp}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel_omp}}

  upload.lib.aarch64:
    stage: UPLOAD
    component: shell
    only:
      - ^master$
    inputs:
      image: ${{parameters.image_base}}
      script: |
        export DATE=$(date -d "+8 hour" +"%Y%m%d")
        wget -q "${{jobs.build_deb_aarch64.outputs.artifacts.target.url}}" -O ${{parameters.pack_deb_aarch64}}
        wget -q "${{jobs.build_rel_aarch64.outputs.artifacts.target.url}}" -O ${{parameters.pack_rel_aarch64}}

        ossutil64 cp ${{parameters.pack_deb_aarch64}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_deb_aarch64}} --update
        ossutil64 cp ${{parameters.pack_rel_aarch64}} ${{parameters.oss_path}}/${DATE}/${{parameters.pack_rel_aarch64}} --update

