version: "2.0"

stages:
  - META
  - BUILD
  - UNIT_TEST
  - MONITOR

components:
  ace-build:
    kind: agent
    inputs:
      arch:
        description: 'arch'
        defaultValue: x86_64
      image:
        description: 'imageBuild'
        defaultValue: ${{jobs.meta.outputs.metadata.imageBuild}}
      branch:
        description: 'branch'
        defaultValue: ${{vcs.ref}}
      token:
        description: 'tokenCI'
        defaultValue: ${{secrets.ciToken}}
      cacheKey:
        description: 'cacheKey'
        defaultValue: ''
      option:
        description: 'buildOptions'
        defaultValue: ''
      parall:
        description: 'parallNum'
        defaultValue: 40
    execute:
      agent:
        arch: ${{inputs.arch}}
        container:
          image: ${{inputs.image}}
        resourceClass: L
      steps:
        - name: shell
          displayName: 'CLONE'
          with:
            script: |
              git clone -b ${{inputs.branch}} https://git:${{inputs.token}}@code.alipay.com/air-infra/air-infra.git
        - name: shell
          displayName: 'BUILD'
          with:
            script: |
              export CI_TOKEN=${{inputs.token}}
              cmake -S air-infra -B build ${{inputs.option}} -GNinja
              cmake --build build -- -j ${{inputs.parall}}
        - name: shell
          displayName: 'CTEST'
          with:
            script: |
              cmake --build build --target test
        - name: shell
          displayName: 'INSTALL'
          with:
            script: |
              cmake --install build --prefix install
        - name: oss-cache
          displayName: 'CACHE-UPLOAD'
          with:
            type: upload
            key: ${{inputs.cacheKey}}
            paths: install
            forceUpload: true

  ace-test:
    kind: agent
    inputs:
      arch:
        description: 'arch'
        defaultValue: x86_64
      image:
        description: 'imageTest'
        defaultValue: ${{jobs.meta.outputs.metadata.imageTest}}
      cacheKey:
        description: 'cacheKey'
        defaultValue: ''
      mark:
        description: 'testMarks'
        defaultValue: ''
    execute:
      agent:
        arch: ${{inputs.arch}}
        container:
          image: ${{inputs.image}}
        resourceClass: L
      steps:
        - name: oss-cache
          displayName: 'CACHE-RESTORE'
          with:
            type: restore
            key: ${{inputs.cacheKey}}
        - name: shell
          with:
            script: |
              mv install /opt/avhc
              pip install cti==0.1.0 -i https://artifacts.antgroup-inc.cn/artifact/repositories/simple-dev/
              python3 -m pytest --pyargs cti -m '${{inputs.mark}}' -p no:warnings --junit-xml=report.xml
        - name: testcase-and-coverage-uploader
          alwaysRun: true
          with:
            caseReportPath: 'report.xml'
    outputs:
      uploadResult:
        description: 'report'
        value: ${{execute.outputs.uploadResult}}
    web:
      type: template
      source: common-ut
      config:
        afterExecute:
          checkRule:
          - ${{outputs.caseFailCount}} < 1
        data:
          ${{outputs.uploadResult}}
jobs:
  meta:
    stage: META
    id: meta
    component: aci-metadata
  config:
    stage: META
    id: config
    component: aci-metadata
    inputs:
      key: app

  build-deb-x86_64:
    id: build-deb-x86_64
    stage: BUILD
    component: ace-build
    inputs:
      cacheKey: ${{pipeline.id}}-build-deb-x86_64
      option: -DCMAKE_BUILD_TYPE=Debug
  build-rel-x86_64:
    id: build-rel-x86_64
    stage: BUILD
    component: ace-build
    inputs:
      cacheKey: ${{pipeline.id}}-build-rel-x86_64
      option: -DCMAKE_BUILD_TYPE=Release
  build-deb-aarch64:
    id: build-deb-aarch64
    stage: BUILD
    component: ace-build
    inputs:
      arch: arm
      cacheKey: ${{pipeline.id}}-build-deb-aarch64
      option: -DCMAKE_BUILD_TYPE=Debug
  build-rel-aarch64:
    id: build-rel-aarch64
    stage: BUILD
    component: ace-build
    inputs:
      arch: arm
      cacheKey: ${{pipeline.id}}-build-rel-aarch64
      option: -DCMAKE_BUILD_TYPE=Release

  test-deb-x86_64:
    stage: UNIT_TEST
    component: ace-test
    inputs:
      cacheKey: ${{pipeline.id}}-build-deb-x86_64
      mark: unit
  test-rel-x86_64:
    stage: UNIT_TEST
    component: ace-test
    inputs:
      cacheKey: ${{pipeline.id}}-build-rel-x86_64
      mark: unit
  test-deb-aarch64:
    stage: UNIT_TEST
    component: ace-test
    inputs:
      arch: arm
      cacheKey: ${{pipeline.id}}-build-deb-aarch64
      mark: unit
  test-rel-aarch64:
    stage: UNIT_TEST
    component: ace-test
    inputs:
      arch: arm
      cacheKey: ${{pipeline.id}}-build-rel-aarch64
      mark: unit

  # check-repos-sync:
  #   stage: MONITOR
  #   component: trigger-x-pipeline
  #   inputs:
  #     devapiKey: ${{secrets.AccessKey}}
  #     devapiSecret: ${{secrets.AccessSecret}}
  #     projectId: ${{parameters.checkPrjId}}
  #     ymlPath: ${{parameters.checkRule}}
  #     branch: master
  #   only:
  #     - ^master$

triggers:
  git:
    push:
      changesIgnore:
        - ^LEGAL.md$
        - ^README.md$
        - ^doc/**
    pullRequest:
      changesIgnore:
        - ^LEGAL.md$
        - ^README.md$
        - ^doc/**
